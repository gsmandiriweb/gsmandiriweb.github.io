<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-label="Ilustrasi proyek konstruksi dengan pagar BRC dan guard rail">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f6"/>
      <stop offset="1" stop-color="#f8f9fb"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8eaf0"/>
      <stop offset="1" stop-color="#dde0e6"/>
    </linearGradient>
    <pattern id="mesh" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M0 0H38M0 0V38" stroke="#aab0ba" stroke-width="3"/>
      <rect x="15" y="15" width="8" height="8" fill="#9aa1ac"/>
    </pattern>
  </defs>

  <!-- sky + ground -->
  <rect width="1200" height="500" fill="url(#sky)"/>
  <rect y="470" width="1200" height="310" fill="url(#ground)"/>
  <rect y="612" width="1200" height="168" fill="#d3d7dd"/>
  <line x1="0" y1="612" x2="1200" y2="612" stroke="#c4c9d1" stroke-width="2"/>

  <!-- tower crane (construction signal) -->
  <g stroke="#b7bcc5" stroke-width="7" fill="none" stroke-linecap="round">
    <line x1="985" y1="110" x2="985" y2="470"/>
    <line x1="700" y1="118" x2="1130" y2="118"/>
    <line x1="985" y1="118" x2="985" y2="150"/>
    <line x1="760" y1="118" x2="900" y2="60"/>
    <line x1="1080" y1="118" x2="1180" y2="78"/>
  </g>
  <line x1="900" y1="118" x2="900" y2="150" stroke="#cdd1d8" stroke-width="2"/>
  <rect x="892" y="150" width="16" height="14" rx="2" fill="#9aa1ac"/>

  <!-- warehouse -->
  <g>
    <polygon points="120,300 620,300 600,262 150,262" fill="#cfd4db"/>
    <rect x="120" y="300" width="500" height="172" fill="#dde1e7"/>
    <line x1="245" y1="300" x2="245" y2="472" stroke="#c4c9d1" stroke-width="3"/>
    <line x1="370" y1="300" x2="370" y2="472" stroke="#c4c9d1" stroke-width="3"/>
    <line x1="495" y1="300" x2="495" y2="472" stroke="#c4c9d1" stroke-width="3"/>
    <rect x="300" y="372" width="80" height="100" fill="#aeb4bd"/>
    <rect x="312" y="384" width="56" height="76" fill="#c9ced5"/>
    <rect x="150" y="330" width="70" height="26" fill="#bcc2ca"/>
    <rect x="520" y="330" width="70" height="26" fill="#bcc2ca"/>
    <!-- red accent banner at entrance -->
    <rect x="324" y="352" width="32" height="14" rx="2" fill="#e22b1e"/>
  </g>

  <!-- foreground BRC mesh fence -->
  <g>
    <rect x="80" y="470" width="300" height="250" fill="url(#mesh)"/>
    <rect x="80" y="470" width="300" height="250" fill="none" stroke="#9aa1ac" stroke-width="4"/>
    <rect x="74" y="460" width="12" height="270" rx="3" fill="#878d97"/>
    <rect x="374" y="460" width="12" height="270" rx="3" fill="#878d97"/>
  </g>

  <!-- guard rail along the road -->
  <g>
    <path d="M430 656 q30 -14 60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 t60 0 L1150 700 q-30 14 -60 0 t-60 0 t-60 0 t-60 0 t-60 0 t-60 0 t-60 0 t-60 0 t-60 0 t-60 0 t-60 0 t-60 0 Z" fill="#c2c7cf" stroke="#a7adb7" stroke-width="2"/>
    <line x1="430" y1="678" x2="1150" y2="678" stroke="#9aa1ac" stroke-width="2"/>
    <g fill="#8b929c">
      <rect x="486" y="700" width="10" height="60"/><rect x="606" y="700" width="10" height="60"/>
      <rect x="726" y="700" width="10" height="60"/><rect x="846" y="700" width="10" height="60"/>
      <rect x="966" y="700" width="10" height="60"/><rect x="1086" y="700" width="10" height="60"/>
    </g>
    <circle cx="491" cy="662" r="5" fill="#e22b1e"/>
  </g>
</svg>
